# Build macOS (ARM + Intel) + Windows executables and upload as GitHub Release artifacts.
#
# Triggers:
#   - Push a tag like v1.0.0   → creates a GitHub Release with all zips
#   - Manual dispatch           → uploads artifacts (no release created)

name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the artifacts (e.g. v1.0.0-beta)'
        required: false
        default: 'dev'

permissions:
  contents: write   # needed to create releases

jobs:
  # ── Verify tag matches resolved version (tag pushes only) ──
  # Catches the case where someone pushes `v1.1.0` but forgot to bump or
  # left junk in the working tree. The resolver also runs in `build` jobs
  # via prebuild/PRSH.spec; this guard short-circuits the whole pipeline
  # before doing the (slow) cross-platform build.
  verify-version:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with full history for git describe)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve version from freeze-version.py
        id: version
        run: |
          resolved="$(python3 scripts/freeze-version.py --print)"
          tag="${GITHUB_REF_NAME#v}"
          echo "Resolved: $resolved"
          echo "Tag:      $tag"
          if [ "$resolved" != "$tag" ]; then
            echo "::error::Tag/version mismatch: tag=$tag resolved=$resolved"
            echo "::error::Either the tag isn't on the right commit, or the working tree is dirty."
            exit 1
          fi
          echo "version=$resolved" >> "$GITHUB_OUTPUT"

  # ── Build frontend (shared by all platform jobs) ──
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # frontend prebuild needs git history for freeze-version.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          include-hidden-files: true
          retention-days: 1

  # ── Build executables ──
  build:
    needs: [frontend, verify-version]
    # verify-version is gated on tag pushes; treat 'skipped' as a pass so
    # workflow_dispatch and non-tag builds aren't blocked by it.
    if: |
      always() &&
      needs.frontend.result == 'success' &&
      (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            arch: arm64
            artifact: PRSH-macOS-arm64
          - os: macos-latest
            arch: x86_64
            artifact: PRSH-macOS-x86_64
          - os: windows-latest
            arch: native
            artifact: PRSH-Windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0    # PRSH.spec runs freeze-version.py, which needs git history

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      # ── Python setup (native arm64 / Windows) ──
      - name: Setup Python (native)
        if: matrix.arch != 'x86_64'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── Python setup (x86_64 via Rosetta) ──
      - name: Install x86_64 Python via Rosetta
        if: matrix.arch == 'x86_64'
        run: |
          curl -fsSL https://www.python.org/ftp/python/3.12.7/python-3.12.7-macos11.pkg -o /tmp/python.pkg
          sudo installer -pkg /tmp/python.pkg -target /
          # The universal installer places x86_64-capable Python at /usr/local/bin
          arch -x86_64 /usr/local/bin/python3.12 --version

      - name: Create x86_64 venv
        if: matrix.arch == 'x86_64'
        run: |
          arch -x86_64 /usr/local/bin/python3.12 -m venv venv-x86
          echo "${{ github.workspace }}/venv-x86/bin" >> $GITHUB_PATH

      # ── Install Python dependencies ──
      - name: Install Python dependencies (native)
        if: matrix.arch != 'x86_64'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install . pyinstaller

      - name: Install Python dependencies (x86_64)
        if: matrix.arch == 'x86_64'
        shell: bash
        run: |
          arch -x86_64 python -m pip install --upgrade pip
          arch -x86_64 pip install . pyinstaller

      - name: Install macOS tray backend
        if: runner.os == 'macOS' && matrix.arch != 'x86_64'
        run: pip install "pyobjc-framework-Cocoa"

      - name: Install macOS tray backend (x86_64)
        if: matrix.arch == 'x86_64'
        run: arch -x86_64 pip install "pyobjc-framework-Cocoa"

      # ── Build executable ──
      - name: Run PyInstaller (native)
        if: matrix.arch != 'x86_64'
        run: pyinstaller PRSH.spec --noconfirm

      - name: Run PyInstaller (x86_64)
        if: matrix.arch == 'x86_64'
        env:
          PYINSTALLER_TARGET_ARCH: x86_64
        run: arch -x86_64 pyinstaller PRSH.spec --noconfirm

      # ── Package (macOS: pre-zip to preserve .app symlinks) ──
      # -y is required to store symlinks as symlinks; without it `zip`
      # dereferences each symlink and stores the linked file's contents,
      # undoing the dedup step above and re-bloating the archive.
      - name: Create zip (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -ryq ../${{ matrix.artifact }}.zip PRSH.app

      # ── Build Windows installer (Inno Setup is preinstalled on windows-latest) ──
      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Resolve version from git/freeze-version.py (matches what the
          # bundled app reports). Inno Setup needs an X.Y.Z numeric form
          # for the installer metadata, so we strip any -N-gSHA[-dirty]
          # suffix that `git describe` appends on non-tag commits.
          $version = (& python scripts/freeze-version.py --print).Trim()
          $numeric = ($version -split '-')[0]
          if (-not ($numeric -match '^\d+\.\d+\.\d+$')) {
            throw "Refusing to build installer with non-numeric version '$numeric' (resolved '$version')"
          }
          Write-Host "Building installer for version $numeric (resolved $version)"
          New-Item -ItemType Directory -Force -Path installer\out | Out-Null
          $iscc = Get-ChildItem -Path "${env:ProgramFiles(x86)}\Inno Setup *\ISCC.exe","${env:ProgramFiles}\Inno Setup *\ISCC.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $iscc) { throw "Inno Setup compiler (ISCC.exe) not found" }
          & $iscc.FullName `
            /DAppVersion=$numeric `
            /O"installer\out" `
            installer\PRSH.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup compilation failed" }

      # ── Stage Windows output so Actions wraps a clean PRSH/ folder ──
      - name: Stage Windows output
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release_root | Out-Null
          Move-Item dist\PRSH release_root\PRSH

      # ── Upload artifact ──
      - name: Upload build artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

      - name: Upload build artifact (Windows portable)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release_root

      - name: Upload build artifact (Windows installer)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: PRSH-Windows-Installer
          path: installer/out/PRSH-Setup.exe

  # ── Create GitHub Release (only on tag push) ──
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # The Windows portable folder (PRSH-Windows) is still uploaded as a
      # workflow artifact for debugging / workflow_dispatch downloads, but
      # the public release attaches only the Inno Setup installer to keep
      # users on a single, signable, auto-updating distribution path.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/PRSH-macOS-arm64/PRSH-macOS-arm64.zip
            artifacts/PRSH-macOS-x86_64/PRSH-macOS-x86_64.zip
            artifacts/PRSH-Windows-Installer/PRSH-Setup.exe
