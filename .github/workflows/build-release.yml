# Build macOS + Windows executables and upload as GitHub Release artifacts.
#
# Triggers:
#   - Push a tag like v1.0.0   → creates a GitHub Release with both zips
#   - Manual dispatch           → uploads artifacts (no release created)

name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the artifacts (e.g. v1.0.0-beta)'
        required: false
        default: 'dev'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write   # needed to create releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: PRSH-macOS
            zip_contents: dist/PRSH.app
          - os: windows-latest
            artifact: PRSH-Windows
            zip_contents: dist/PRSH

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Node.js (frontend build) ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # ── Python (PyInstaller) ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        shell: bash
        run: |
          pip install --upgrade pip
          pip install \
            "fastapi>=0.111.0" \
            "httpx[http2]>=0.28.1" \
            "watchfiles>=0.21" \
            "python-dateutil>=2.9.0" \
            "loguru>=0.7.2" \
            "orjson>=3.10.3" \
            "websockets>=12.0" \
            "python-socketio>=5.11.2" \
            "uvicorn>=0.30.1" \
            "pillow>=10.3.0" \
            "cryptography>=44.0.1" \
            "aiopath>=0.7.7" \
            "aiomisc>=17.6.3" \
            "pandas>=2.2.0" \
            "requests>=2.31.0" \
            "numpy" \
            "jinja2" \
            "python-multipart" \
            "pystray" \
            "git+https://github.com/matt-gree/pyrio.git" \
            pyinstaller

      - name: Install macOS tray backend
        if: runner.os == 'macOS'
        run: pip install "pyobjc-framework-Cocoa"

      # ── Build executable ──
      - name: Run PyInstaller
        run: pyinstaller PRSH.spec --noconfirm

      # ── Package ──
      - name: Create zip (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          zip -r -q ../${{ matrix.artifact }}.zip PRSH.app

      - name: Create zip (Windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist\PRSH -DestinationPath ${{ matrix.artifact }}.zip

      # ── Upload artifact (available on every run) ──
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  # ── Create GitHub Release (only on tag push) ──
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/PRSH-macOS/PRSH-macOS.zip
            artifacts/PRSH-Windows/PRSH-Windows.zip
