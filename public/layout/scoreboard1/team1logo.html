<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      overflow: hidden;
      margin: 0;
      width: 360px;
      height: 360px;
      background: transparent;
    }
    .team-logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 360px;
      height: 360px;
    }
    .team-logo {
      width: 360px;
      height: 360px;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="team-logo-container" id="team-logo-container"></div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/layout/lib/overlay-base.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const SCOREBOARD = parseInt(params.get('scoreboard')) || 1;
    const TEAM_NUM = 1;
    const STATE_KEY = `score.${SCOREBOARD}.team.${TEAM_NUM}.player.1.msb_team`;
    const { deepGet, BASE_URL, state } = OverlayBase;

    function render() {
      const container = document.getElementById('team-logo-container');
      container.innerHTML = '';
      const teamName = deepGet(state, STATE_KEY);
      if (teamName) {
        const img = document.createElement('img');
        img.src = `${BASE_URL}/game_assets/rio_teamLogos/${encodeURIComponent(teamName)}.png`;
        img.className = 'team-logo';
        img.onerror = () => img.style.display = 'none';
        container.appendChild(img);
      }
    }

    OverlayBase.init({
      render,
      shouldRender: (key) => key === STATE_KEY || key.startsWith(STATE_KEY + '.'),
    });
  </script>
</body>
</html>
