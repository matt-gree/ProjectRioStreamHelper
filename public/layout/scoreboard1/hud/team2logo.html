<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      overflow: hidden;
      margin: 0;
      width: 360px;
      height: 360px;
      background: transparent;
    }
    .team-logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 360px;
      height: 360px;
    }
    .team-logo {
      width: 360px;
      height: 360px;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <div class="team-logo-container" id="team-logo-container"></div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const TEAM_NUM = 2;
    const SCOREBOARD = 1;
    const STATE_KEY = `score.${SCOREBOARD}.team.${TEAM_NUM}.player.1.msb_team`;

    const BASE_URL = (window.location.protocol === 'file:')
      ? 'http://localhost:5260'
      : window.location.origin;

    let state = {};

    function deepGet(obj, path) {
      const keys = path.split('.');
      let cur = obj;
      for (const k of keys) {
        if (cur == null || typeof cur !== 'object') return undefined;
        cur = cur[k];
      }
      return cur;
    }

    function deepSet(obj, path, value) {
      const keys = path.split('.');
      let cur = obj;
      for (let i = 0; i < keys.length - 1; i++) {
        if (!(keys[i] in cur) || typeof cur[keys[i]] !== 'object' || cur[keys[i]] === null) {
          cur[keys[i]] = {};
        }
        cur = cur[keys[i]];
      }
      cur[keys[keys.length - 1]] = value;
    }

    function render() {
      const container = document.getElementById('team-logo-container');
      container.innerHTML = '';

      const teamName = deepGet(state, STATE_KEY);
      if (teamName) {
        const img = document.createElement('img');
        img.src = `${BASE_URL}/game_assets/rio_teamLogos/${encodeURIComponent(teamName)}.png`;
        img.className = 'team-logo';
        img.onerror = () => img.style.display = 'none';
        container.appendChild(img);
      }
    }

    async function fetchState() {
      try {
        const resp = await fetch(`${BASE_URL}/api/v1/state`);
        if (resp.ok) {
          state = await resp.json();
          render();
          return true;
        }
      } catch (e) {}
      return false;
    }

    async function bootstrap() {
      await fetchState();

      const socket = io(BASE_URL, { transports: ['websocket', 'polling'] });

      socket.on('connect', () => {
        console.log('[team2logo] SocketIO connected');
        socket.emit('v1.state.get', {}, (fullState) => {
          if (fullState && !fullState.error) {
            state = fullState;
            render();
          }
        });
      });

      socket.on('connect_error', (err) => {
        console.warn('[team2logo] SocketIO connect error:', err.message);
      });

      socket.on('v1.state.set', (msg) => {
        if (msg.sid === socket.id) return;
        deepSet(state, msg.key, msg.value);
        if (msg.key === STATE_KEY || msg.key.startsWith(STATE_KEY + '.')) {
          render();
        }
      });

      socket.on('v1.state.set_batch', (msg) => {
        if (msg.sid === socket.id) return;
        let needsRender = false;
        for (const item of msg.items) {
          deepSet(state, item.key, item.value);
          if (item.key === STATE_KEY || item.key.startsWith(STATE_KEY + '.')) needsRender = true;
        }
        if (needsRender) render();
      });

    }

    bootstrap();
  </script>
</body>
</html>
