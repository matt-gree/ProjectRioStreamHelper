<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    body {
      overflow: hidden;
      margin: 0;
      width: 325px;
      height: 120px;
      background: transparent;
      font-family: 'Inter', sans-serif;
    }

    .stats-bar {
      width: 325px;
      box-sizing: border-box;
      background: rgba(20, 20, 30, 0.92);
      border-radius: 8px;
      padding: 8px 12px;
      color: #fff;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.4));
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .stats-bar.slide-out {
      opacity: 0;
      transform: translateY(8px);
    }
    .stats-bar.slide-in {
      animation: slideIn 0.3s ease forwards;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hidden { display: none !important; }

    /* Top row: icon + name + role */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .char-icon {
      width: 28px;
      height: 28px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .char-name {
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }
    .role-tag {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .role-tag.batting { background: #d97706; }
    .role-tag.pitching { background: #2563eb; }

    /* Stats row */
    .stats-row {
      display: flex;
      justify-content: space-between;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 0;
    }
    .stat-value {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
    }
    .stat-label {
      font-size: 8px;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      line-height: 1.2;
    }
  </style>
</head>
<body>
  <div class="stats-bar hidden" id="stats-bar"></div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    const TEAM_NUM = 1;
    const SCOREBOARD = 1;

    const BASE_URL = (window.location.protocol === 'file:')
      ? 'http://localhost:5260'
      : window.location.origin;

    let state = {};
    let prevCharName = '';

    function deepSet(obj, path, value) {
      const keys = path.split('.');
      let cur = obj;
      for (let i = 0; i < keys.length - 1; i++) {
        if (!(keys[i] in cur) || typeof cur[keys[i]] !== 'object' || cur[keys[i]] === null) {
          cur[keys[i]] = {};
        }
        cur = cur[keys[i]];
      }
      cur[keys[keys.length - 1]] = value;
    }

    function deepGet(obj, path) {
      const keys = path.split('.');
      let cur = obj;
      for (const k of keys) {
        if (cur == null || typeof cur !== 'object') return undefined;
        cur = cur[k];
      }
      return cur;
    }

    function deepUnset(obj, path) {
      const keys = path.split('.');
      let cur = obj;
      for (let i = 0; i < keys.length - 1; i++) {
        if (cur == null || typeof cur !== 'object') return;
        cur = cur[keys[i]];
      }
      if (cur != null && typeof cur === 'object') {
        delete cur[keys[keys.length - 1]];
      }
    }

    function deriveBatting(raw) {
      const ab = raw.at_bats || 0;
      const hits = raw.hits || 0;
      const singles = raw.singles || 0;
      const doubles = raw.doubles || 0;
      const triples = raw.triples || 0;
      const hr = raw.homeruns || 0;
      const bb = raw.walks_bb || 0;
      const hbp = raw.walks_hbp || 0;
      const sf = raw.sac_flys || 0;
      const so = raw.strikeouts || 0;

      const avg = ab ? hits / ab : 0;
      const slg = ab ? (singles + 2*doubles + 3*triples + 4*hr) / ab : 0;
      const obpDenom = ab + bb + hbp + sf;
      const obp = obpDenom ? (hits + bb + hbp) / obpDenom : 0;
      const ops = obp + slg;
      return { ab, hits, hr, rbi: raw.rbi || 0, bb, so, avg, slg, obp, ops };
    }

    function derivePitching(raw) {
      const outs = raw.outs_pitched || 0;
      const bf = raw.batters_faced || 0;
      const er = raw.earned_runs || 0;
      const so = raw.strikeouts_pitched || 0;
      const ha = raw.hits_allowed || 0;
      const bb = raw.walks_bb || 0;

      const era = outs ? 27 * (er / outs) : 0;
      const ip = `${Math.floor(outs / 3)}.${outs % 3}`;
      const opp_avg = bf ? ha / bf : 0;
      return { ip, era, so, ha, bb, bf, opp_avg };
    }

    function fmt3(v) { return v.toFixed(3); }
    function fmt2(v) { return v.toFixed(2); }

    function findCharIndex(teamNum, charName) {
      if (!charName) return -1;
      for (let i = 0; i < 9; i++) {
        const name = deepGet(state, `score.${SCOREBOARD}.team.${teamNum}.player.1.character.${i}.name`);
        if (name === charName) return i;
      }
      return -1;
    }

    function getTeamRole() {
      const homeTeam = Number(deepGet(state, `score.${SCOREBOARD}.home_team`) ?? 2);
      const halfInning = deepGet(state, `score.${SCOREBOARD}.half_inning`) ?? 'Top';
      const awayTeam = homeTeam === 2 ? 1 : 2;
      const battingTeam = halfInning === 'Top' ? awayTeam : homeTeam;
      return battingTeam === TEAM_NUM ? 'batting' : 'pitching';
    }

    function buildContent(charName, role, charIndex) {
      const statsObj = deepGet(state, `score.${SCOREBOARD}.stats.team.${TEAM_NUM}.character.${charIndex}`);
      const rawBatting = statsObj?.batting ?? {};
      const rawPitching = statsObj?.pitching ?? {};

      let html = '<div class="header">';
      html += `<img class="char-icon" src="${BASE_URL}/game_assets/rio_characterIcons/${encodeURIComponent(charName)}.png" onerror="this.style.display='none'" />`;
      html += `<span class="char-name">${charName}</span>`;
      html += `<span class="role-tag ${role}">${role === 'batting' ? 'AB' : 'P'}</span>`;
      html += '</div>';

      html += '<div class="stats-row">';
      let stats;
      if (role === 'batting') {
        const s = deriveBatting(rawBatting);
        stats = [
          { l: 'AVG', v: fmt3(s.avg) },
          { l: 'H', v: s.hits },
          { l: 'HR', v: s.hr },
          { l: 'RBI', v: s.rbi },
          { l: 'OBP', v: fmt3(s.obp) },
          { l: 'OPS', v: fmt3(s.ops) },
        ];
      } else {
        const s = derivePitching(rawPitching);
        stats = [
          { l: 'ERA', v: fmt2(s.era) },
          { l: 'IP', v: s.ip },
          { l: 'SO', v: s.so },
          { l: 'HA', v: s.ha },
          { l: 'BB', v: s.bb },
          { l: 'AVG', v: fmt3(s.opp_avg) },
        ];
      }
      for (const st of stats) {
        html += `<span class="stat"><span class="stat-value">${st.v}</span><span class="stat-label">${st.l}</span></span>`;
      }
      html += '</div>';
      return html;
    }

    function render() {
      const bar = document.getElementById('stats-bar');
      const role = getTeamRole();

      let charName, charIndex;
      if (role === 'batting') {
        charName = deepGet(state, `score.${SCOREBOARD}.batter`) || '';
        charIndex = findCharIndex(TEAM_NUM, charName);
      } else {
        charName = deepGet(state, `score.${SCOREBOARD}.pitcher`) || '';
        charIndex = findCharIndex(TEAM_NUM, charName);
      }

      if (!charName || charIndex < 0) {
        bar.classList.add('hidden');
        prevCharName = '';
        return;
      }

      const changed = charName !== prevCharName;
      prevCharName = charName;

      if (changed && !bar.classList.contains('hidden')) {
        // Slide out, swap content, slide in
        bar.classList.add('slide-out');
        bar.classList.remove('slide-in');
        setTimeout(() => {
          bar.innerHTML = buildContent(charName, role, charIndex);
          bar.classList.remove('slide-out', 'hidden');
          bar.classList.add('slide-in');
        }, 300);
      } else {
        bar.innerHTML = buildContent(charName, role, charIndex);
        bar.classList.remove('hidden', 'slide-out');
        if (changed) bar.classList.add('slide-in');
      }
    }

    async function fetchState() {
      try {
        const resp = await fetch(`${BASE_URL}/api/v1/state`);
        if (resp.ok) {
          state = await resp.json();
          render();
          return true;
        }
      } catch (e) {}
      return false;
    }

    async function bootstrap() {
      await fetchState();
      const socket = io(BASE_URL, { transports: ['websocket', 'polling'] });

      socket.on('connect', () => {
        socket.emit('v1.state.get', {}, (fullState) => {
          if (fullState && !fullState.error) { state = fullState; render(); }
        });
      });

      socket.on('v1.state.set', (msg) => {
        if (msg.sid === socket.id) return;
        deepSet(state, msg.key, msg.value);
        render();
      });

      socket.on('v1.state.set_batch', (msg) => {
        if (msg.sid === socket.id) return;
        for (const item of msg.items) {
          deepSet(state, item.key, item.value);
        }
        render();
      });

      socket.on('v1.state.unset', (msg) => {
        if (msg.sid === socket.id) return;
        deepUnset(state, msg.key);
        render();
      });
    }

    bootstrap();
  </script>
</body>
</html>
