<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="overlay-settings" content="accentColor,showSuperstars" />
  <style>
    body {
      overflow: hidden;
      margin: 0;
      width: 452px;
      height: 140px;
      background: transparent;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.12))
        drop-shadow(0 3px 1px rgba(0, 0, 0, 0.14))
        drop-shadow(0 1px 5px rgba(0, 0, 0, 0.12))
        drop-shadow(0 -1px 2px rgba(0, 0, 0, 0.1));
    }
    .roster-container {
      display: inline-grid;
      column-gap: 4px;
      row-gap: 4px;
      grid-template-columns: 104px repeat(4, 52px) 104px;
      grid-template-rows: 60px 60px;
      padding: 8px;
    }
    .captain-container {
      grid-column: 1;
      grid-row: 1 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .captain-container img:not(.superstar-badge) { width: 104px; height: auto; object-fit: contain; }
    .role-container {
      grid-column: 6;
      grid-row: 1 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .role-container img { width: 104px; height: auto; object-fit: contain; }
    .character-container { display: flex; align-items: center; justify-content: center; position: relative; overflow: visible; }
    .character-container img:not(.superstar-badge) { width: 52px; height: auto; object-fit: contain; }
    .captain-container { position: relative; overflow: visible; }
    .superstar-badge {
      position: absolute;
      bottom: -4px;
      right: -4px;
      width: 24px;
      height: 24px;
      object-fit: contain;
      filter: drop-shadow(0 0 3px rgba(245,159,0,0.9));
      pointer-events: none;
    }
    .superstar-badge--captain {
      width: 36px;
      height: 36px;
    }
  </style>
</head>
<body>
  <div class="roster-container" id="roster-container"></div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/layout/lib/overlay-base.js"></script>
  <script src="/layout/lib/rio-data.js"></script>
  <script>
    const REF_W = 452, REF_H = 140;
    document.body.dataset.refW = REF_W;
    document.body.dataset.refH = REF_H;
    function autoScale() {
      const el = document.getElementById('roster-container');
      const needsScale = Math.abs(window.innerWidth - REF_W) > 2 || Math.abs(window.innerHeight - REF_H) > 2;
      if (needsScale) {
        const scale = Math.min(window.innerWidth / REF_W, window.innerHeight / REF_H);
        document.body.style.width = window.innerWidth + 'px';
        document.body.style.height = window.innerHeight + 'px';
        el.style.transform = `scale(${scale})`;
        el.style.transformOrigin = 'top left';
      } else {
        document.body.style.width = REF_W + 'px';
        document.body.style.height = REF_H + 'px';
        el.style.transform = '';
      }
    }
    window.addEventListener('resize', autoScale);
    autoScale();

    const params = new URLSearchParams(window.location.search);
    const SCOREBOARD = parseInt(params.get('scoreboard')) || 1;
    const TEAM_NUM = parseInt(params.get('team')) || 1;
    const { state } = OverlayBase;

    // Per-slot CSS class for this overlay's grid. The shared data helper
    // returns logical kinds ('captain' | 'char' | 'role'); we map them to
    // the class names this overlay's stylesheet uses.
    const SLOT_CLASS = {
      captain: 'captain-container',
      char: 'character-container',
      role: 'role-container',
    };

    const { settings, deepGet } = OverlayBase;

    function render() {
      const container = document.getElementById('roster-container');
      container.innerHTML = '';

      const showSuperstars = deepGet(settings, 'overlays.roster.showSuperstars', true) !== false;

      const slots = RioData.getRosterSlots(state, SCOREBOARD, TEAM_NUM, { includeRole: true });
      for (const slot of slots) {
        const div = document.createElement('div');
        div.className = SLOT_CLASS[slot.kind];
        const img = document.createElement('img');
        img.src = slot.imgUrl;
        img.onerror = () => img.style.display = 'none';
        div.appendChild(img);
        if (showSuperstars && slot.isStarred) {
          const badge = document.createElement('img');
          badge.src = `${OverlayBase.BASE_URL}/game_assets/msb/superstar.png`;
          badge.className = slot.kind === 'captain'
            ? 'superstar-badge superstar-badge--captain'
            : 'superstar-badge';
          div.appendChild(badge);
        }
        container.appendChild(div);
      }
    }

    OverlayBase.init({
      render,
      fetchSettings: true,
      shouldRender: (key) =>
        key.startsWith(`score.${SCOREBOARD}.player.${TEAM_NUM}.`)
        || key === `score.${SCOREBOARD}.half_inning`
        || key === `score.${SCOREBOARD}.home_team`
        || key === `score.${SCOREBOARD}.source_type`
        || key === `score.${SCOREBOARD}.game_completed`,
      shouldRenderSettings: (key) => key.startsWith('overlays.roster.'),
    });
  </script>
</body>
</html>
