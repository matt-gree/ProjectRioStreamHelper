<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="overlay-settings" content="accentColor,showSuperstars,showRoleIcon,showTeamLogo" />
  <style>
    body {
      overflow: hidden;
      margin: 0;
      width: 452px;
      height: 140px;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.12))
        drop-shadow(0 3px 1px rgba(0, 0, 0, 0.14))
        drop-shadow(0 1px 5px rgba(0, 0, 0, 0.12))
        drop-shadow(0 -1px 2px rgba(0, 0, 0, 0.1));
    }
    .roster-container {
      display: inline-grid;
      padding: 8px;
    }
    .captain-container {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: visible;
    }
    .captain-container img:not(.superstar-badge) { width: var(--captain-size, 104px); height: auto; object-fit: contain; }
    .role-container, .team-logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .role-container img { width: var(--trailing-size, 104px); height: auto; object-fit: contain; }
    .team-logo-container img { width: var(--trailing-size, 104px); height: auto; object-fit: contain; }
    .character-container { display: flex; align-items: center; justify-content: center; position: relative; overflow: visible; }
    .character-container img:not(.superstar-badge) { width: var(--char-size, 52px); height: auto; object-fit: contain; }
    .superstar-badge {
      position: absolute;
      bottom: -4px;
      right: -4px;
      width: 24px;
      height: 24px;
      object-fit: contain;
      filter: drop-shadow(0 0 3px rgba(245,159,0,0.9));
      pointer-events: none;
    }
    .superstar-badge--captain {
      width: 36px;
      height: 36px;
    }
  </style>
</head>
<body>
  <div class="roster-container" id="roster-container"></div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/layout/lib/overlay-base.js"></script>
  <script src="/layout/lib/rio-data.js"></script>
  <script>
    const REF_W = 452, REF_H = 140;
    document.body.dataset.refW = REF_W;
    document.body.dataset.refH = REF_H;
    let viewportScale = 1;
    function autoScale() {
      const el = document.getElementById('roster-container');
      const needsScale = Math.abs(window.innerWidth - REF_W) > 2 || Math.abs(window.innerHeight - REF_H) > 2;
      if (needsScale) {
        viewportScale = Math.min(window.innerWidth / REF_W, window.innerHeight / REF_H);
        document.body.style.width = window.innerWidth + 'px';
        document.body.style.height = window.innerHeight + 'px';
      } else {
        viewportScale = 1;
        document.body.style.width = REF_W + 'px';
        document.body.style.height = REF_H + 'px';
      }
      applyOuterScale(el);
    }
    function applyOuterScale(el) {
      if (!el) return;
      if (viewportScale !== 1) {
        el.style.transform = `scale(${viewportScale})`;
        el.style.transformOrigin = 'center center';
      } else {
        el.style.transform = '';
      }
    }
    window.addEventListener('resize', autoScale);
    autoScale();

    const params = new URLSearchParams(window.location.search);
    const SCOREBOARD = parseInt(params.get('scoreboard')) || 1;
    const TEAM_NUM = parseInt(params.get('team')) || 1;
    const { state } = OverlayBase;

    const SLOT_CLASS = {
      captain: 'captain-container',
      char: 'character-container',
      role: 'role-container',
      teamLogo: 'team-logo-container',
    };

    const { settings, deepGet } = OverlayBase;

    // Reference roster icon sizes — trailing icons match captain, all scale uniformly to fit.
    const CHAR_SIZE = 52;
    const CAPTAIN_SIZE = 104;
    const ROW_H = 60;
    const GAP = 4;
    const PAD = 8;

    // Uniform fit-scale: shrink everything proportionally if the natural grid overflows the frame.
    function rosterFitScale(trailingCount) {
      const cols = 5 + trailingCount;
      const naturalGridW = CAPTAIN_SIZE + 4 * CHAR_SIZE + trailingCount * CAPTAIN_SIZE + (cols - 1) * GAP;
      const naturalGridH = 2 * ROW_H + GAP;
      const availW = REF_W - 2 * PAD;
      const availH = REF_H - 2 * PAD;
      return Math.min(1, availW / naturalGridW, availH / naturalGridH);
    }

    function render() {
      const container = document.getElementById('roster-container');
      container.innerHTML = '';

      const showSuperstars = deepGet(settings, 'overlays.roster.showSuperstars', true) !== false;
      const showRole = deepGet(settings, 'overlays.roster.showRoleIcon', true) !== false;
      const showTeamLogo = deepGet(settings, 'overlays.roster.showTeamLogo', true) !== false;

      const slots = RioData.getRosterSlots(state, SCOREBOARD, TEAM_NUM, {
        includeRole: showRole,
        includeTeamLogo: showTeamLogo,
      });

      const hasLogo = slots.some(s => s.kind === 'teamLogo');
      const trailingCount = (showRole ? 1 : 0) + (hasLogo ? 1 : 0);
      const s = rosterFitScale(trailingCount);
      const charSize = CHAR_SIZE * s;
      const captainSize = CAPTAIN_SIZE * s;
      const gap = GAP * s;
      const rowH = ROW_H * s;

      container.style.setProperty('--char-size', charSize + 'px');
      container.style.setProperty('--captain-size', captainSize + 'px');
      container.style.setProperty('--trailing-size', captainSize + 'px');
      container.style.columnGap = gap + 'px';
      container.style.rowGap = gap + 'px';
      container.style.gridTemplateRows = `${rowH}px ${rowH}px`;

      let cols = `${captainSize}px repeat(4, ${charSize}px)`;
      if (showRole)  cols += ` ${captainSize}px`;
      if (hasLogo)   cols += ` ${captainSize}px`;
      container.style.gridTemplateColumns = cols;
      applyOuterScale(container);

      // Assign explicit grid positions to row-spanning items.
      let trailingCol = 5;
      for (const slot of slots) {
        const div = document.createElement('div');
        div.className = SLOT_CLASS[slot.kind];
        if (slot.kind === 'captain') {
          div.style.gridColumn = '1';
          div.style.gridRow = '1 / 3';
        } else if (slot.kind === 'role' || slot.kind === 'teamLogo') {
          trailingCol++;
          div.style.gridColumn = String(trailingCol);
          div.style.gridRow = '1 / 3';
        }
        const img = document.createElement('img');
        img.src = slot.imgUrl;
        img.onerror = () => img.style.display = 'none';
        div.appendChild(img);
        if (showSuperstars && slot.isStarred) {
          const badge = document.createElement('img');
          badge.src = `${OverlayBase.BASE_URL}/game_assets/msb/gameIcons/superstar.png`;
          badge.className = slot.kind === 'captain'
            ? 'superstar-badge superstar-badge--captain'
            : 'superstar-badge';
          div.appendChild(badge);
        }
        container.appendChild(div);
      }
    }

    OverlayBase.init({
      render,
      fetchSettings: true,
      shouldRender: (key) =>
        key.startsWith(`score.${SCOREBOARD}.player.${TEAM_NUM}.`)
        || key === `score.${SCOREBOARD}.half_inning`
        || key === `score.${SCOREBOARD}.home_team`
        || key === `score.${SCOREBOARD}.source_type`
        || key === `score.${SCOREBOARD}.game_completed`,
      shouldRenderSettings: (key) =>
        key.startsWith('overlays.roster.')
        || key.startsWith('scoreboards.sources.'),
    });
  </script>
</body>
</html>
