<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="overlay-settings" content="accentColor, cardBg, borderRadius, borderColor, borderWidth, fontFamily, connectorColor, activeColor, maxScale" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #f59e0b;
      --accent-rgb: 245, 158, 11;
      --player-height: 28px;
      --set-gap: 6px;
      --round-gap: 48px;
      --name-size: 13px;
      --score-size: 13px;
      --round-label-size: 12px;
      --connector-color: rgba(255, 255, 255, 0.2);
      --connector-width: 2px;
      --bg-card: rgba(15, 15, 25, 0.92);
      --bg-slot: rgba(255, 255, 255, 0.06);
      --bg-slot-winner: rgba(var(--accent-rgb), 0.15);
      --bg-slot-active: rgba(59, 130, 246, 0.15);
      --text-primary: #fff;
      --text-dimmed: rgba(255, 255, 255, 0.5);
      --border-color: rgba(255, 255, 255, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* The bracket is intrinsically sized by its data (round count drives
       width, round-1 match count drives height), so the body fills whatever
       OBS browser source size the user picks and `#bracket-frame` centers a
       scaled copy of `#bracket-container` inside it. autoScale() (below) caps
       upscaling at `overlays.bracket.maxScale` so small brackets aren't blown
       up to fill a huge source. */
    html, body {
      width: 100%;
      height: 100%;
    }
    body {
      overflow: hidden;
      background: transparent;
      font-family: var(--font-family, 'Inter', sans-serif);
      color: var(--text-primary, #fff);
    }

    /* Centering frame — fills the body, centers the scaled bracket. */
    #bracket-frame {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #bracket-container {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 16px;
      transform-origin: center center;
      /* Keep the bracket sized to its content. Without this the parent flex
         (#bracket-frame) shrinks the box to frame width while content
         overflows; transform-origin center then sits at the BOX center, not
         the CONTENT center, so scaling shifts content sideways. */
      flex-shrink: 0;
      flex-grow: 0;
      width: max-content;
      max-width: none;
    }

    /* ── Section headers ── */
    .section-header {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .phase-name {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    /* ── Bracket section (winners / losers) ── */
    .bracket-section {
      position: relative;
    }

    .rounds-container {
      display: flex;
      gap: var(--round-gap);
      align-items: stretch;
      position: relative;
    }

    /* ── Round column ── */
    .round {
      display: flex;
      flex-direction: column;
      gap: 0;
      min-width: 180px;
      flex-shrink: 0;
    }

    .round-label {
      font-size: var(--round-label-size);
      font-weight: 600;
      color: var(--text-dimmed);
      text-align: center;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .round-sets {
      display: flex;
      flex-direction: column;
      justify-content: center;
      flex: 1;
    }

    /* ── Set (match) ── */
    .set {
      display: flex;
      flex-direction: column;
      border: var(--border-width, 1px) solid var(--border-color);
      border-radius: 6px;
      overflow: hidden;
      background: var(--bg-card);
      margin: var(--set-gap) 0;
    }

    .set.active {
      border-color: rgba(59, 130, 246, 0.5);
      box-shadow: 0 0 8px rgba(59, 130, 246, 0.2);
    }

    /* ── Bye placeholder ──
       Same outer dimensions as a real .set so the round 1 layout reads as a
       full-bracket grid (e.g. 14-player single elim renders as a 16-slot
       round 1 with two visible bye gaps). Visually muted so a bye doesn't
       compete for attention with real matches. */
    .set.bye {
      border-color: transparent;
      background: transparent;
    }
    .set.bye .bye-slot {
      background: rgba(255, 255, 255, 0.03);
      color: var(--text-dimmed);
      font-style: italic;
      justify-content: space-between;
    }
    .set.bye .bye-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--text-dimmed);
      padding: 1px 6px;
      border: 1px solid var(--text-dimmed);
      border-radius: 3px;
    }
    .set.bye .bye-spacer {
      background: transparent;
      border-bottom: none;
    }
    .set.bye .slot-name.empty {
      font-style: italic;
    }

    /* ── Player slot ── */
    .slot {
      display: flex;
      align-items: center;
      height: var(--player-height);
      padding: 0 8px;
      gap: 6px;
      background: var(--bg-slot);
    }

    .slot:first-child {
      border-bottom: 1px solid var(--border-color);
    }

    .slot.winner {
      background: var(--bg-slot-winner);
    }

    .slot.active-player {
      background: var(--bg-slot-active);
    }

    .slot-seed {
      font-size: 10px;
      color: var(--text-dimmed);
      min-width: 18px;
      text-align: right;
    }

    .slot-name {
      font-size: var(--name-size);
      font-weight: 600;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .slot-name.empty {
      color: var(--text-dimmed);
      font-weight: 400;
      font-style: italic;
    }

    .slot-prefix {
      font-size: 10px;
      color: var(--accent);
      font-weight: 600;
    }

    .slot-score {
      font-size: var(--score-size);
      font-weight: 700;
      min-width: 20px;
      text-align: center;
      color: var(--text-dimmed);
    }

    .slot.winner .slot-score {
      color: var(--accent);
    }

    /* ── Grand Finals ── */
    .grand-finals {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .grand-finals .set {
      min-width: 220px;
    }

    .gf-label {
      font-size: var(--round-label-size);
      font-weight: 600;
      color: var(--text-dimmed);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── SVG connectors ── */
    .connectors-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    .connectors-svg path {
      stroke: var(--connector-color);
      stroke-width: var(--connector-width);
      fill: none;
    }

    .connectors-svg path.animate-line {
      animation: drawLine var(--line-duration, 0.4s) ease-out forwards;
      animation-delay: var(--line-delay, 0s);
      stroke-dasharray: var(--line-length);
      stroke-dashoffset: var(--line-length);
    }

    @keyframes drawLine {
      to { stroke-dashoffset: 0; }
    }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      color: var(--text-dimmed);
      font-size: 16px;
    }

    /* ── Entrance animations ── */
    @keyframes roundSlideIn {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }


    @keyframes headerFadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes gfSlideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .round {
      opacity: 0;
    }

    .round.animate-in {
      animation: roundSlideIn 0.4s ease-out forwards;
    }

    .connectors-svg {
      opacity: 1;
    }

    .phase-name.animate-in {
      animation: headerFadeIn 0.3s ease-out forwards;
    }

    .section-header.animate-in {
      animation: headerFadeIn 0.3s ease-out forwards;
    }

    .grand-finals {
      opacity: 0;
    }

    .grand-finals.animate-in {
      animation: gfSlideUp 0.4s ease-out forwards;
    }

    /* ── Variants ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="bracket-frame">
  <div id="bracket-container">
    <div class="empty-state" id="empty-state">
      Load a bracket from the Bracket tab to display it here.
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/layout/lib/overlay-base.js"></script>
  <script>
    // Reference dims for the iframe-preview detector (Layouts tab's
    // ScaledIframe). The bracket itself is fluid in OBS — body fills the
    // browser source — but inside an iframe wrapper the parent needs SOME
    // size to inflate the iframe element to. 1600x900 is a sensible "design
    // canvas" big enough that the bracket renders at native pixel sizes,
    // which the preview iframe then scales down to fit its tile.
    document.body.dataset.refW = 1600;
    document.body.dataset.refH = 900;

    /* Content-sized scaling.
       The bracket's natural pixel size is determined by its data, not a fixed
       canvas. After every render we measure the bracket-container, compute
       scale = min(frameW/contentW, frameH/contentH, maxScale), and apply it
       via transform. The flex parent (#bracket-frame) handles centering.

       maxScale (default 1.0) caps upscaling so a small bracket in a big OBS
       source stays at designed pixel sizes, centered with empty space around
       it, instead of being blown up to fill the frame. */
    function getMaxScale() {
      // In preview mode (Design tab iframe tiles), let the bracket scale up
      // to fill the tile so small sample brackets are easy to inspect. The
      // user-configurable maxScale only caps real OBS sources.
      if (OverlayBase.PREVIEW_MODE) return Infinity;
      const v = parseFloat(OverlayBase.deepGet(OverlayBase.settings, 'overlays.bracket.maxScale', 1.0));
      return Number.isFinite(v) && v > 0 ? v : 1.0;
    }

    function autoScale() {
      const el = document.getElementById('bracket-container');
      if (!el) return;
      // Measure unscaled content. Reset transform first so scrollWidth/Height
      // reflect natural pixels, not the previously-scaled box.
      el.style.transform = 'none';
      const contentW = el.scrollWidth;
      const contentH = el.scrollHeight;
      const frameW = window.innerWidth;
      const frameH = window.innerHeight;
      if (contentW <= 0 || contentH <= 0 || frameW <= 0 || frameH <= 0) return;

      const fit = Math.min(frameW / contentW, frameH / contentH);
      const scale = Math.min(fit, getMaxScale());
      el.style.transform = `scale(${scale})`;
    }

    /* ─── Configuration ─── */
    const params = new URLSearchParams(window.location.search);
    const WINNERS_ONLY = params.get('winners_only') === 'true';
    const LOSERS_ONLY = params.get('losers_only') === 'true';
    const { deepGet, state, settings, applyDesignSettings } = OverlayBase;

    /* ─── Helpers: infer connections + bye layout from entrant IDs ───
       Many bracket providers (notably start.gg as we ingest it) don't include
       an explicit `connections` map. The renderer's heuristic fallback uses
       proportional mapping (set j of round N+1 fed by set floor(j*ratio) of
       round N), which is wrong whenever a round contains byes — half the R2
       entrants come from R1 winners but the other half came directly from
       seeding. To draw connectors correctly we infer prereqs from entrant
       IDs: for each R(N+1) set, find the R(N) set whose winner is one of its
       entrants. The "missing" entrant slot is a bye recipient.

       Also computes a slot-by-slot layout for round 1 that includes invisible
       "bye placeholder" slots, so a 14-player single elim renders as if it
       were a 16-player bracket with the two bye gaps visible at their
       seeded positions. */
    function getSetWinner(s) {
      if (!s) return null;
      if (s.score1 === 'W') return s.entrant1Id;
      if (s.score2 === 'W') return s.entrant2Id;
      return null;
    }

    function inferRoundLayouts(bracket) {
      // Returns:
      //   { connections: { destSetId: [prereqSetId, ...] },
      //     roundLayouts: { 'winners-1': [{kind:'set', set} | {kind:'bye', id, entrantId, after}], ... } }
      const out = { connections: {}, roundLayouts: {} };
      const sections = ['winners', 'losers'];
      for (const sec of sections) {
        const rounds = sec === 'winners' ? (bracket.winnersRounds || {}) : (bracket.losersRounds || {});
        const roundNums = Object.keys(rounds).map(Number).sort((a, b) => a - b);
        if (roundNums.length === 0) continue;

        // Build winner→sourceSetId map for each round.
        const winnerOf = {}; // roundNum → { entrantId: sourceSetId }
        for (const rn of roundNums) {
          const sets = rounds[rn].sets || [];
          const m = {};
          for (const s of sets) {
            const w = getSetWinner(s);
            if (w != null) m[String(w)] = s.id;
          }
          winnerOf[rn] = m;
        }

        // Build connections by walking each non-first round and matching
        // entrants back to the previous round's winners.
        for (let i = 1; i < roundNums.length; i++) {
          const prevWinners = winnerOf[roundNums[i - 1]] || {};
          for (const s of (rounds[roundNums[i]].sets || [])) {
            const prereqs = [];
            for (const eid of [s.entrant1Id, s.entrant2Id]) {
              if (eid != null && prevWinners[String(eid)] != null) {
                prereqs.push(prevWinners[String(eid)]);
              }
            }
            if (prereqs.length > 0) out.connections[s.id] = prereqs;
          }
        }

        // Compute round-1 layout with bye placeholders.
        // Each R2 set pairs two R1 slots in seeded order. For R2 set i, slot
        // 2i is its top entrant's source, slot 2i+1 is its bottom entrant's
        // source. If either entrant doesn't match an R1 winner, that slot is
        // a bye placeholder.
        if (roundNums.length >= 2) {
          const r1Num = roundNums[0];
          const r2Num = roundNums[1];
          const r1Sets = rounds[r1Num].sets || [];
          const r2Sets = rounds[r2Num].sets || [];
          const r1Winners = winnerOf[r1Num] || {};
          const usedR1 = new Set();
          const layout = [];
          for (let i = 0; i < r2Sets.length; i++) {
            const r2 = r2Sets[i];
            const prereqIds = [];
            for (const eid of [r2.entrant1Id, r2.entrant2Id]) {
              if (eid != null && r1Winners[String(eid)] != null) {
                const srcId = r1Winners[String(eid)];
                const srcSet = r1Sets.find(s => s.id === srcId);
                layout.push({ kind: 'set', set: srcSet });
                usedR1.add(srcId);
                prereqIds.push(srcId);
              } else {
                const byeId = `bye-${sec}-${r2.id}-${eid ?? 'empty'}`;
                layout.push({ kind: 'bye', id: byeId, entrantId: eid });
                prereqIds.push(byeId);
              }
            }
            // Replace the R2 set's connection list with the slot-aware
            // prereqs (real R1 sets + bye placeholders) so
            // positionRoundWithConnections centers R2 between its two slot
            // anchors instead of just on the real R1 set.
            if (prereqIds.length > 0) out.connections[r2.id] = prereqIds;
          }
          // Append any R1 sets that weren't matched to an R2 entrant
          // (shouldn't happen for a well-formed bracket, but safer than
          // dropping data on the floor).
          for (const s of r1Sets) {
            if (!usedR1.has(s.id)) layout.push({ kind: 'set', set: s });
          }
          out.roundLayouts[`${sec}-${r1Num}`] = layout;
        }
      }
      return out;
    }

    /* ─── Render ─── */
    // Cached signature of the last rendered bracket. The start.gg/challonge
    // poller can re-push identical bracket data multiple times in succession
    // on initial load; without this guard the bracket DOM gets stripped and
    // re-inserted on each push, restarting animations and producing a blank
    // round-1 flash while staggered animation-delays catch up.
    let lastBracketSig = null;

    function render() {
      applyDesignSettings('bracket');

      // Apply design variables to bracket-specific CSS vars
      const root = document.documentElement.style;
      const cardBg = getComputedStyle(document.documentElement).getPropertyValue('--card-bg').trim();
      const borderColor = getComputedStyle(document.documentElement).getPropertyValue('--border-color').trim();
      const borderRadius = getComputedStyle(document.documentElement).getPropertyValue('--border-radius').trim();
      if (cardBg) root.setProperty('--bg-card', cardBg);
      if (borderColor) root.setProperty('--border-color', borderColor);

      const bracket = deepGet(state, 'bracket');
      const container = document.getElementById('bracket-container');
      const emptyState = document.getElementById('empty-state');

      if (!bracket || !bracket.players || Object.keys(bracket.players).length === 0) {
        emptyState.classList.remove('hidden');
        lastBracketSig = null;
        return;
      }
      emptyState.classList.add('hidden');

      // Skip the expensive DOM rebuild if the bracket data hasn't actually
      // changed. Settings-only re-renders (which only mutate CSS variables)
      // still flow through the early lines above before this guard returns.
      const sig = JSON.stringify(bracket);
      if (sig === lastBracketSig) return;
      lastBracketSig = sig;

      const { type, phaseName, winnersRounds, losersRounds, grandFinals, players } = bracket;
      const isDoubleElim = type === 'DOUBLE_ELIMINATION';

      // If the source bracket data lacks explicit prereq connections (start.gg
      // brackets don't include them today), infer them from entrant IDs and
      // build a round-1 layout that surfaces byes as visible empty slots.
      const inferred = inferRoundLayouts(bracket);
      const hadConnections = bracket.connections && Object.keys(bracket.connections).length > 0;
      const connections = hadConnections ? bracket.connections : inferred.connections;
      // Mutate so alignBracketRounds + drawConnectors (which read
      // state.bracket.connections directly) pick this up too.
      bracket.connections = connections;
      const roundLayouts = inferred.roundLayouts;

      let html = '';

      // Phase name
      if (phaseName) {
        html += `<div class="phase-name">${esc(phaseName)}</div>`;
      }

      // Pool formats (round-robin and Swiss) lay out as flat lists of rounds
      // with no inter-round connections. Treating Swiss like RR for now is
      // a placeholder — Swiss really wants its own pairing-style layout, but
      // suppressing connectors is closer to correct than drawing bracket-style
      // lines that don't reflect actual Swiss pairings.
      const isRoundRobin = type === 'ROUND_ROBIN' || type === 'SWISS';

      // Winners bracket
      if (!LOSERS_ONLY && winnersRounds && Object.keys(winnersRounds).length > 0) {
        html += renderSection(
          isDoubleElim ? 'Winners Bracket' : '',
          winnersRounds,
          players,
          'winners',
          isRoundRobin,
          roundLayouts
        );
      }

      // Grand Finals
      if (!LOSERS_ONLY && !WINNERS_ONLY && grandFinals && grandFinals.length > 0) {
        html += renderGrandFinals(grandFinals, players);
      }

      // Losers bracket
      if (!WINNERS_ONLY && isDoubleElim && losersRounds && Object.keys(losersRounds).length > 0) {
        html += renderSection('Losers Bracket', losersRounds, players, 'losers', false, roundLayouts);
      }

      // Only replace inner content (keep empty-state element)
      // Remove old rendered content
      const existing = container.querySelectorAll('.phase-name, .bracket-section, .grand-finals');
      existing.forEach(el => el.remove());

      container.insertAdjacentHTML('beforeend', html);

      // Order matters here:
      //   1. Reset container transform to none so getBoundingClientRect calls
      //      below return native (unscaled) viewport coordinates. Otherwise
      //      pyramid alignment and connector paths get computed in already-
      //      scaled space and come out wrong on every render after the first.
      //   2. alignBracketRounds + drawConnectors at native scale.
      //   3. autoScale measures + applies the fit-to-frame scale.
      //   4. animateIn starts CSS animations *inside* the now-scaled
      //      container — running them before autoScale would cause a visible
      //      snap when the scale lands mid-animation.
      requestAnimationFrame(() => {
        const container = document.getElementById('bracket-container');
        if (container) container.style.transform = 'none';
        alignBracketRounds();
        drawConnectors();
        autoScale();
        animateIn();
      });
    }

    /* ─── Align rounds into a centered pyramid ─── */
    function alignBracketRounds() {
      const bracket = deepGet(state, 'bracket');
      const connections = bracket?.connections || {};
      const hasConnections = Object.keys(connections).length > 0;

      const sections = document.querySelectorAll('.bracket-section');

      for (const section of sections) {
        if (section.dataset.roundRobin === 'true') continue;

        const roundEls = Array.from(section.querySelectorAll('.round'));
        if (roundEls.length < 2) continue;

        const setGap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--set-gap')) * 2;

        // Reset all round-sets to natural flow
        for (const round of roundEls) {
          const rs = round.querySelector('.round-sets');
          if (rs) {
            rs.style.gap = `${setGap}px`;
            rs.style.justifyContent = 'center';
            for (const set of rs.querySelectorAll('.set')) {
              set.style.marginTop = '';
              set.style.marginBottom = '';
            }
          }
        }

        // Find the pivot round (most sets) — this gets even spacing,
        // everything else aligns relative to it
        let pivotIdx = 0;
        let maxSets = 0;
        for (let i = 0; i < roundEls.length; i++) {
          const count = roundEls[i].querySelectorAll('.round-sets > .set').length;
          if (count >= maxSets) {
            maxSets = count;
            pivotIdx = i;
          }
        }

        // Forward from pivot: align each round to its feeders (standard pyramid)
        for (let i = pivotIdx + 1; i < roundEls.length; i++) {
          if (hasConnections) {
            positionRoundWithConnections(roundEls[i - 1], roundEls[i], connections, 'forward', setGap);
          } else {
            positionRoundFromReference(roundEls[i - 1], roundEls[i]);
          }
        }

        // Backward from pivot: align earlier (bye/play-in) rounds to their targets
        for (let i = pivotIdx - 1; i >= 0; i--) {
          if (hasConnections) {
            positionRoundWithConnections(roundEls[i + 1], roundEls[i], connections, 'backward', setGap);
          } else {
            positionRoundFromReference(roundEls[i + 1], roundEls[i]);
          }
        }
      }
    }

    /**
     * Position sets using actual bracket connection data.
     * direction: 'forward' = toAlign is the later round (prereqs in ref)
     *            'backward' = toAlign is the earlier round (feeds into ref)
     */
    function positionRoundWithConnections(refRoundEl, alignRoundEl, connections, direction, setGap) {
      const refSets = Array.from(refRoundEl.querySelectorAll('.round-sets > .set'));
      const alignSets = Array.from(alignRoundEl.querySelectorAll('.round-sets > .set'));
      const alignContainer = alignRoundEl.querySelector('.round-sets');

      if (refSets.length === 0 || alignSets.length === 0 || !alignContainer) return;

      alignContainer.style.justifyContent = 'flex-start';
      alignContainer.style.gap = '0';

      const containerTop = alignContainer.getBoundingClientRect().top;
      const refSetMap = {};
      for (let i = 0; i < refSets.length; i++) refSetMap[refSets[i].dataset.setId] = i;

      const desiredCenters = new Array(alignSets.length);
      let allResolved = true;

      if (direction === 'forward') {
        // Each align set centers on the midpoint of its prereqs in the ref round
        for (let j = 0; j < alignSets.length; j++) {
          const setId = alignSets[j].dataset.setId;
          const prereqs = connections[setId] || [];
          const prereqIdxs = prereqs.map(pid => refSetMap[String(pid)]).filter(idx => idx !== undefined);

          if (prereqIdxs.length > 0) {
            const centers = prereqIdxs.map(idx => {
              const r = refSets[idx].getBoundingClientRect();
              return r.top + r.height / 2;
            });
            desiredCenters[j] = centers.reduce((a, b) => a + b, 0) / centers.length;
          } else {
            allResolved = false;
            break;
          }
        }
      } else {
        // Backward: group align sets by their target in the ref round
        const reverseMap = {};
        for (const [matchId, prereqs] of Object.entries(connections)) {
          for (const pid of prereqs) {
            if (!reverseMap[pid]) reverseMap[pid] = [];
            reverseMap[pid].push(matchId);
          }
        }

        const groups = new Map(); // refIdx -> [alignIdx]
        for (let j = 0; j < alignSets.length; j++) {
          const setId = alignSets[j].dataset.setId;
          const targets = reverseMap[setId] || [];
          let refIdx = null;
          for (const tid of targets) {
            const idx = refSetMap[String(tid)];
            if (idx !== undefined) { refIdx = idx; break; }
          }

          if (refIdx !== null) {
            if (!groups.has(refIdx)) groups.set(refIdx, []);
            groups.get(refIdx).push(j);
          } else {
            allResolved = false;
            break;
          }
        }

        if (allResolved) {
          for (const [refIdx, alignIdxs] of groups) {
            const refRect = refSets[refIdx].getBoundingClientRect();
            const refMidY = refRect.top + refRect.height / 2;

            if (alignIdxs.length === 1) {
              desiredCenters[alignIdxs[0]] = refMidY;
            } else {
              // Center the group on the ref set (standard bracket pair)
              const heights = alignIdxs.map(idx => alignSets[idx].getBoundingClientRect().height);
              const totalHeight = heights.reduce((a, b) => a + b, 0) + (alignIdxs.length - 1) * setGap;
              let y = refMidY - totalHeight / 2;
              for (let k = 0; k < alignIdxs.length; k++) {
                desiredCenters[alignIdxs[k]] = y + heights[k] / 2;
                y += heights[k] + setGap;
              }
            }
          }
        }
      }

      if (!allResolved) {
        // Fall back to heuristic alignment
        positionRoundFromReference(refRoundEl, alignRoundEl);
        return;
      }

      // Apply margins, preventing overlap. Also zero margin-bottom — the
      // .set stylesheet rule applies `margin: var(--set-gap) 0`, and with
      // flex `gap: 0` that 6px bottom margin would otherwise stack between
      // siblings and push each subsequent set 6px below its desired center.
      let lastBottom = 0;
      for (let j = 0; j < alignSets.length; j++) {
        const setHeight = alignSets[j].getBoundingClientRect().height;
        const desiredTop = desiredCenters[j] - setHeight / 2 - containerTop;
        const marginTop = Math.max(0, desiredTop - lastBottom);
        alignSets[j].style.marginTop = `${marginTop}px`;
        alignSets[j].style.marginBottom = '0';
        lastBottom = desiredTop + setHeight;
      }
    }

    /**
     * Heuristic fallback: position sets using proportional mapping.
     * Handles standard pyramids, close counts, and play-in rounds.
     */
    function positionRoundFromReference(referenceRoundEl, toAlignRoundEl) {
      const refSets = Array.from(referenceRoundEl.querySelectorAll('.round-sets > .set'));
      const alignSets = Array.from(toAlignRoundEl.querySelectorAll('.round-sets > .set'));
      const alignContainer = toAlignRoundEl.querySelector('.round-sets');

      if (refSets.length === 0 || alignSets.length === 0 || !alignContainer) return;

      alignContainer.style.justifyContent = 'flex-start';
      alignContainer.style.gap = '0';

      const containerTop = alignContainer.getBoundingClientRect().top;
      const setGap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--set-gap')) * 2;

      // Compute desired center Y for each align set
      const desiredCenters = new Array(alignSets.length);

      if (alignSets.length <= refSets.length) {
        // Fewer or equal align sets: each centers on a group of ref sets
        const groupSize = refSets.length / alignSets.length;

        for (let j = 0; j < alignSets.length; j++) {
          const refStart = Math.floor(j * groupSize);
          const refEnd = Math.min(Math.floor((j + 1) * groupSize) - 1, refSets.length - 1);
          const topRect = refSets[refStart].getBoundingClientRect();
          const bottomRect = refSets[refEnd].getBoundingClientRect();
          desiredCenters[j] = (topRect.top + topRect.height / 2 + bottomRect.top + bottomRect.height / 2) / 2;
        }
      } else {
        // More align sets than ref sets (e.g. 9 play-in on 8 next round)
        // Group align sets by their proportional ref target
        const groups = new Map();
        for (let j = 0; j < alignSets.length; j++) {
          const refIdx = Math.min(Math.floor(j * refSets.length / alignSets.length), refSets.length - 1);
          if (!groups.has(refIdx)) groups.set(refIdx, []);
          groups.get(refIdx).push(j);
        }

        for (const [refIdx, alignIdxs] of groups) {
          const refRect = refSets[refIdx].getBoundingClientRect();
          const refMidY = refRect.top + refRect.height / 2;

          if (alignIdxs.length === 1) {
            desiredCenters[alignIdxs[0]] = refMidY;
          } else {
            // Center the group on the ref set
            const heights = alignIdxs.map(idx => alignSets[idx].getBoundingClientRect().height);
            const totalHeight = heights.reduce((a, b) => a + b, 0) + (alignIdxs.length - 1) * setGap;
            let y = refMidY - totalHeight / 2;
            for (let k = 0; k < alignIdxs.length; k++) {
              desiredCenters[alignIdxs[k]] = y + heights[k] / 2;
              y += heights[k] + setGap;
            }
          }
        }
      }

      // Apply margins, preventing overlap. See sibling function for why
      // margin-bottom must be explicitly zeroed.
      let lastBottom = 0;
      for (let j = 0; j < alignSets.length; j++) {
        const setHeight = alignSets[j].getBoundingClientRect().height;
        const desiredTop = desiredCenters[j] - setHeight / 2 - containerTop;
        const marginTop = Math.max(0, desiredTop - lastBottom);
        alignSets[j].style.marginTop = `${marginTop}px`;
        alignSets[j].style.marginBottom = '0';
        lastBottom = desiredTop + setHeight;
      }
    }

    /* ─── Staggered entrance animation ─── */
    function animateIn() {
      // In preview mode (Design tab iframes), render fully visible at once.
      // Animations are noisy when the user is tweaking design controls and
      // expecting an instant before/after view.
      if (OverlayBase.PREVIEW_MODE) {
        for (const el of document.querySelectorAll('.phase-name, .section-header, .round, .grand-finals')) {
          el.style.animation = 'none';
          el.style.opacity = '1';
          el.style.transform = 'none';
        }
        return;
      }
      let delay = 0;
      const ROUND_STAGGER = 150; // ms between each round
      const HEADER_DURATION = 200;

      // Animate phase name
      const phaseName = document.querySelector('.phase-name');
      if (phaseName) {
        phaseName.style.animationDelay = `${delay}ms`;
        phaseName.classList.add('animate-in');
        delay += HEADER_DURATION;
      }

      // Animate each section
      const sections = document.querySelectorAll('.bracket-section');
      for (const section of sections) {
        // Section header
        const header = section.querySelector('.section-header');
        if (header) {
          header.style.animationDelay = `${delay}ms`;
          header.classList.add('animate-in');
          delay += HEADER_DURATION;
        }

        // Rounds left-to-right — store delay on element for connector timing
        const rounds = section.querySelectorAll('.round');
        for (const round of rounds) {
          round.dataset.animDelay = delay;
          round.style.animationDelay = `${delay}ms`;
          round.classList.add('animate-in');
          delay += ROUND_STAGGER;
        }
      }

      // Grand finals
      const gf = document.querySelector('.grand-finals');
      if (gf) {
        gf.style.animationDelay = `${delay + 100}ms`;
        gf.classList.add('animate-in');
      }
    }

    /* ─── Render a bracket section (winners or losers) ─── */
    function renderSection(title, rounds, players, sectionClass, isRoundRobin = false, roundLayouts = null) {
      const roundNums = Object.keys(rounds).map(Number).sort((a, b) => a - b);
      if (roundNums.length === 0) return '';

      const rrAttr = isRoundRobin ? ' data-round-robin="true"' : '';
      let html = `<div class="bracket-section ${sectionClass}${isRoundRobin ? ' round-robin' : ''}" data-section="${sectionClass}"${rrAttr}>`;
      if (title) {
        html += `<div class="section-header">${esc(title)}</div>`;
      }
      html += `<div class="rounds-container"${isRoundRobin ? ' style="align-items: flex-start;"' : ''}>`;

      for (const roundNum of roundNums) {
        const round = rounds[roundNum];
        const sets = round.sets || [];
        const layout = roundLayouts ? roundLayouts[`${sectionClass}-${roundNum}`] : null;

        html += `<div class="round" data-round="${roundNum}" data-section="${sectionClass}">`;
        html += `<div class="round-label">${esc(round.name || `Round ${roundNum}`)}</div>`;
        html += `<div class="round-sets">`;

        if (layout && layout.length > 0) {
          // Render in slot order with bye placeholders interleaved.
          for (const slot of layout) {
            if (slot.kind === 'set') html += renderSet(slot.set, players);
            else html += renderByePlaceholder(slot.id, slot.entrantId, players);
          }
        } else {
          for (const set of sets) {
            html += renderSet(set, players);
          }
        }

        html += `</div></div>`;
      }

      html += `</div>`;
      // SVG for connectors (skip for round robin)
      if (!isRoundRobin) {
        html += `<svg class="connectors-svg" data-section="${sectionClass}"></svg>`;
      }
      html += `</div>`;
      return html;
    }

    /* ─── Render Grand Finals ─── */
    function renderGrandFinals(sets, players) {
      let html = '<div class="grand-finals">';
      for (let i = 0; i < sets.length; i++) {
        const label = sets.length > 1 && i === 1 ? 'Grand Finals Reset' : 'Grand Finals';
        html += `<div class="gf-label">${label}</div>`;
        html += renderSet(sets[i], players);
      }
      html += '</div>';
      return html;
    }

    /* ─── Render a single set ─── */
    /* A blank set-shaped placeholder reserving a slot for a bye recipient.
       Shows just the seeded player's name + "BYE" so the gap reads as
       intentional rather than a layout glitch, while keeping the same
       outer dimensions as a real .set so positionRoundWithConnections
       can use it as a prereq anchor. */
    function renderByePlaceholder(id, entrantId, players) {
      const p = entrantId != null ? players[entrantId] : null;
      const name = p ? esc(p.name) : '';
      return (
        `<div class="set bye" data-set-id="${id}">` +
        `  <div class="slot bye-slot">` +
        `    <span class="slot-name${name ? '' : ' empty'}">${name || ''}</span>` +
        `    <span class="bye-badge">BYE</span>` +
        `  </div>` +
        `  <div class="slot bye-spacer"></div>` +
        `</div>`
      );
    }

    function renderSet(set, players) {
      const isActive = set.state === 'active' || set.state === 'called';
      const isCompleted = set.completed;
      const p1 = set.entrant1Id ? players[set.entrant1Id] : null;
      const p2 = set.entrant2Id ? players[set.entrant2Id] : null;

      // Determine winner
      let p1Winner = false, p2Winner = false;
      if (isCompleted) {
        if (set.score1 === 'W' || (typeof set.score1 === 'number' && typeof set.score2 === 'number' && set.score1 > set.score2)) {
          p1Winner = true;
        } else if (set.score2 === 'W' || (typeof set.score1 === 'number' && typeof set.score2 === 'number' && set.score2 > set.score1)) {
          p2Winner = true;
        }
      }

      let cls = 'set';
      if (isActive) cls += ' active';

      let html = `<div class="${cls}" data-set-id="${set.id}">`;
      html += renderSlot(p1, set.score1, p1Winner, isActive);
      html += renderSlot(p2, set.score2, p2Winner, isActive);
      html += '</div>';
      return html;
    }

    /* ─── Render a player slot ─── */
    function renderSlot(player, score, isWinner, isActive) {
      let cls = 'slot';
      if (isWinner) cls += ' winner';
      else if (isActive && player) cls += ' active-player';

      let html = `<div class="${cls}">`;

      if (player) {
        if (player.seed) {
          html += `<span class="slot-seed">${player.seed}</span>`;
        }
        if (player.prefix) {
          html += `<span class="slot-prefix">${esc(player.prefix)}</span>`;
        }
        html += `<span class="slot-name">${esc(player.name)}</span>`;
      } else {
        html += `<span class="slot-name empty">TBD</span>`;
      }

      if (score != null) {
        html += `<span class="slot-score">${score}</span>`;
      } else {
        html += `<span class="slot-score">-</span>`;
      }

      html += '</div>';
      return html;
    }

    /* ─── Draw SVG connector lines between rounds ─── */
    function drawConnectors() {
      const bracket = deepGet(state, 'bracket');
      const connections = bracket?.connections || {};
      const hasConnections = Object.keys(connections).length > 0;

      const sections = document.querySelectorAll('.bracket-section');

      for (const section of sections) {
        const svg = section.querySelector('.connectors-svg');
        if (!svg) continue;

        svg.innerHTML = '';

        const sectionRect = section.getBoundingClientRect();
        const roundEls = Array.from(section.querySelectorAll('.round'));

        if (hasConnections) {
          // Connection-based drawing: use actual bracket relationships
          const allSetEls = {};
          for (const setEl of section.querySelectorAll('.set')) {
            allSetEls[setEl.dataset.setId] = setEl;
          }

          for (const [matchId, prereqs] of Object.entries(connections)) {
            const toEl = allSetEls[String(matchId)];
            if (!toEl) continue;

            for (const prereqId of prereqs) {
              const fromEl = allSetEls[String(prereqId)];
              if (!fromEl) continue;

              const fromRound = fromEl.closest('.round');
              const toRound = toEl.closest('.round');
              const sourceDelay = parseFloat(fromRound?.dataset.animDelay || 0);
              const destDelay = parseFloat(toRound?.dataset.animDelay || 0);
              const lineStart = sourceDelay + 200;
              const lineDuration = Math.max(200, destDelay - lineStart);

              addConnector(svg, sectionRect, fromEl, toEl, lineStart, lineDuration);
            }
          }
        } else {
          // Heuristic drawing: proportional mapping
          for (let i = 0; i < roundEls.length - 1; i++) {
            const leftRound = roundEls[i];
            const rightRound = roundEls[i + 1];

            const leftSets = Array.from(leftRound.querySelectorAll('.set'));
            const rightSets = Array.from(rightRound.querySelectorAll('.set'));

            if (leftSets.length === 0 || rightSets.length === 0) continue;

            const sourceDelay = parseFloat(leftRound.dataset.animDelay || 0);
            const destDelay = parseFloat(rightRound.dataset.animDelay || 0);
            const lineStart = sourceDelay + 200;
            const lineDuration = Math.max(200, destDelay - lineStart);

            // Each left set connects to a right set via proportional mapping
            for (let j = 0; j < leftSets.length; j++) {
              const rightIdx = Math.min(
                Math.floor(j * rightSets.length / leftSets.length),
                rightSets.length - 1
              );
              addConnector(svg, sectionRect, leftSets[j], rightSets[rightIdx], lineStart, lineDuration);
            }
          }
        }

        svg.style.width = section.scrollWidth + 'px';
        svg.style.height = section.scrollHeight + 'px';
      }
    }

    function addConnector(svg, sectionRect, fromEl, toEl, lineStart, lineDuration) {
      const fromRect = fromEl.getBoundingClientRect();
      const toRect = toEl.getBoundingClientRect();

      const x1 = fromRect.right - sectionRect.left;
      const y1 = fromRect.top + fromRect.height / 2 - sectionRect.top;
      const x2 = toRect.left - sectionRect.left;
      const y2 = toRect.top + toRect.height / 2 - sectionRect.top;
      const xMid = x1 + (x2 - x1) / 2;

      const d = `M ${x1} ${y1} L ${xMid} ${y1} L ${xMid} ${y2} L ${x2} ${y2}`;
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', d);
      svg.appendChild(path);

      const len = path.getTotalLength();
      path.style.setProperty('--line-length', len);
      path.style.setProperty('--line-delay', `${lineStart}ms`);
      path.style.setProperty('--line-duration', `${lineDuration}ms`);
      // Skip the dashoffset draw-in animation in preview mode so connectors
      // appear immediately alongside the bracket.
      if (!OverlayBase.PREVIEW_MODE) {
        path.classList.add('animate-line');
      }
    }

    /* ─── Helpers ─── */
    function esc(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    /* ─── Init ───
       In preview mode, prime `state.bracket` from the sample JSON BEFORE init
       runs and tell init to skip state — otherwise the SocketIO v1.state.get
       wipe would race over our sample data. */
    async function boot() {
      if (OverlayBase.PREVIEW_MODE) {
        try {
          const resp = await fetch(`${OverlayBase.BASE_URL}/layout/preview/bracket_sample.json`);
          const data = resp.ok ? await resp.json() : null;
          if (data) OverlayBase.deepSet(OverlayBase.state, 'bracket', data);
        } catch { /* ignore — render will show empty bracket */ }
      }
      OverlayBase.init({
        render,
        fetchSettings: true,
        shouldRender: (key) => key === 'bracket' || key.startsWith('bracket.'),
        // Re-render on global design changes (color, font, shadows, etc.)
        // and bracket-specific overrides (connectorColor, activeColor, maxScale).
        // NOT on unrelated scoreboard/ticker setting changes — those used to
        // strip/re-insert the bracket DOM and restart animations needlessly.
        shouldRenderSettings: (key) => key.startsWith('overlays.global.') || key.startsWith('overlays.bracket.'),
        skipState: OverlayBase.PREVIEW_MODE,
      });
    }
    boot();

    // Window resize: rescale only. drawConnectors is intentionally NOT
    // re-called here — its math reads getBoundingClientRect at the current
    // (scaled) layout, so re-running while a transform is applied would
    // produce wrong path coords. Connectors render correctly through the
    // parent transform, so the existing SVG just scales with everything else.
    window.addEventListener('resize', () => requestAnimationFrame(autoScale));

    // Re-fit once everything has settled (fonts loaded, async layout flushed).
    // A single settle-pass on document.fonts.ready instead of a ResizeObserver,
    // which fired mid-animation and produced visible scale shifts on completion.
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => requestAnimationFrame(autoScale));
    }
  </script>
</body>
</html>
