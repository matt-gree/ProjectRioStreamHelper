<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="overlay-settings" content="cardBg, textColor, borderRadius, borderColor, borderWidth, fontFamily, cardShadow, textShadow, statValueColor" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Lalezar&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      overflow: hidden;
      width: 1920px;
      height: 1080px;
      background: transparent;
      font-family: var(--font-family, 'Inter', sans-serif);
      color: var(--text-primary, #fff);
    }

    /* ── Phase banner ── */
    #phase-banner {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #phase-text {
      font-family: 'Lalezar', sans-serif;
      font-size: 48px;
      font-weight: 700;
      -webkit-text-stroke: 5px black;
      text-shadow: 5px 5px 3px rgba(0,0,0,1), var(--text-shadow, none);
      paint-order: stroke fill;
      white-space: nowrap;
      overflow: visible;
    }

    /* ── Player panels ── */
    .player-panel {
      position: absolute;
      top: 620px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    #panel-left  { left: 0;    width: 348px; }
    #panel-right { right: 0;   width: 348px; }

    .player-name {
      font-family: 'Lalezar', sans-serif;
      font-size: 48px;
      font-weight: 700;
      text-align: center;
      text-shadow: 5px 5px 3px rgba(0,0,0,1), var(--text-shadow, none);
      -webkit-text-stroke: 5px black;
      paint-order: stroke fill;
      white-space: nowrap;
      overflow: visible;
      width: 100%;
      padding: 0px 0px;
      line-height: 0.7;
      letter-spacing: 1px;
    }

    /* ── Roster grid ── */
    .roster-wrap {
      display: flex;
      justify-content: center;
    }
    .roster-grid {
      display: inline-grid;
      grid-template-columns: 80px repeat(4, 40px);
      grid-template-rows: 48px 48px;
      column-gap: 4px;
      row-gap: 4px;
    }
    .captain-slot {
      grid-column: 1;
      grid-row: 1 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .captain-slot img { width: 80px; height: auto; object-fit: contain; }
    .char-slot {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .char-slot img { width: 40px; height: auto; object-fit: contain; }
    .role-container {
      grid-column: 6;
      grid-row: 1 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .role-container img { width: 80px; height: auto; object-fit: contain; }

    /* ── Stats bar ── */
    .stats-bar {
      width: 340px;
      background: var(--card-bg, rgba(15, 15, 25, 0.88));
      border: var(--border-width, 1px) solid var(--border-color, rgba(255,255,255,0.08));
      border-radius: var(--border-radius, 12px);
      padding: 6px 8px;
      filter: var(--card-shadow-filter, none);
    }
    .stats-bar.hidden { display: none !important; }

    .stats-top-row {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
    }
    .char-icon-wrap {
      flex-shrink: 0;
    }
    .char-icon-wrap img {
      height: 40px;
      width: auto;
      object-fit: contain;
      border-radius: 4px;
    }
    .stats-content {
      flex: 1;
      min-width: 0;
      padding-left: 10px;
    }
    .stats-row {
      display: flex;
      justify-content: space-between;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
      color: var(--stat-value-color, var(--text-primary, #fff));
      text-shadow: var(--text-shadow, none);
    }
    .stat-label {
      font-size: 12px;
      font-weight: 400;
      color: var(--stat-subtext-color, rgb(155,155,155));
      text-transform: uppercase;
      letter-spacing: 0.3px;
      line-height: 1.2;
      text-shadow: var(--text-shadow, none);
    }
    .game-line {
      font-size: 14px;
      font-weight: 600;
      color: var(--stat-subtext-color, rgb(155,155,155));
      white-space: nowrap;
      overflow: visible;
      text-align: center;
      padding-top: 4px;
      border-top: 1px solid var(--border-color, rgba(255,255,255,0.08));
      margin-top: 4px;
      text-shadow: var(--text-shadow, none);
    }
    .game-line span { color: var(--stat-subtext-color, rgb(155,155,155)); }

    /* ── Twitter bar ── */
    #twitter-bar {
      position: absolute;
      bottom: 0px;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      pointer-events: none;
    }
    #twitter-bar.hidden { display: none !important; }
    #twitter-icon {
      width: 44px;
      height: 44px;
      padding: 4px;
      background-color: #000000;
      border-radius: 4px;
      flex-shrink: 0;
    }
    #twitter-handle {
      font-family: 'Lalezar', sans-serif;
      font-size: 42px;
      font-weight: 700;
      text-shadow: 5px 5px 3px rgba(0,0,0,1), var(--text-shadow, none);
      -webkit-text-stroke: 5px black;
      paint-order: stroke fill;
    }
  </style>
</head>
<body>

  <!-- Phase banner -->
  <div id="phase-banner">
    <span id="phase-text"></span>
  </div>

  <!-- Left player panel (Team 1) -->
  <div class="player-panel" id="panel-left">
    <div class="player-name" id="name-left"></div>
    <div class="roster-wrap"><div class="roster-grid" id="roster-left"></div></div>
    <div class="stats-bar hidden" id="stats-left"></div>
  </div>

  <!-- Right player panel (Team 2) -->
  <div class="player-panel" id="panel-right">
    <div class="player-name" id="name-right"></div>
    <div class="roster-wrap"><div class="roster-grid" id="roster-right"></div></div>
    <div class="stats-bar hidden" id="stats-right"></div>
  </div>

  <!-- Twitter bar -->
  <div id="twitter-bar" class="hidden">
    <!-- X / Twitter logo inline SVG -->
    <svg id="twitter-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
      <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.261 5.635 5.903-5.635Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
    </svg>
    <span id="twitter-handle"></span>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/layout/lib/overlay-base.js"></script>
  <script src="/layout/lib/rio-data.js"></script>
  <script>
    // Tell ScaledIframe the native canvas size
    document.body.dataset.refW = 1920;
    document.body.dataset.refH = 1080;

    const params = new URLSearchParams(window.location.search);
    const SCOREBOARD = parseInt(params.get('scoreboard')) || 1;
    const { deepGet, state, applyDesignSettings } = OverlayBase;

    // Per-slot CSS class for this scene's roster grid.
    const SLOT_CLASS = {
      captain: 'captain-slot',
      char: 'char-slot',
      role: 'role-container',
    };

    // ── Roster renderer ──
    function renderRoster(teamNum, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';

      const slots = RioData.getRosterSlots(state, SCOREBOARD, teamNum, { includeRole: true });
      for (const slot of slots) {
        const div = document.createElement('div');
        div.className = SLOT_CLASS[slot.kind];
        const img = document.createElement('img');
        img.src = slot.imgUrl;
        img.onerror = () => img.style.display = 'none';
        div.appendChild(img);
        container.appendChild(div);
      }
    }

    // ── Stats renderer ──
    function renderStats(teamNum, barId) {
      const bar = document.getElementById(barId);
      const info = RioData.getStatsLine(state, SCOREBOARD, teamNum);
      if (!info) {
        bar.classList.add('hidden');
        return;
      }

      bar.innerHTML = '';

      const topRow = document.createElement('div');
      topRow.className = 'stats-top-row';

      const iconWrap = document.createElement('div');
      iconWrap.className = 'char-icon-wrap';
      const img = document.createElement('img');
      img.src = info.charIconUrl;
      img.onerror = () => img.style.display = 'none';
      iconWrap.appendChild(img);

      const statsRow = document.createElement('div');
      statsRow.className = 'stats-row';
      for (const st of info.stats) {
        const stat = document.createElement('span');
        stat.className = 'stat';
        const val = document.createElement('span');
        val.className = 'stat-value';
        val.textContent = st.value;
        const lbl = document.createElement('span');
        lbl.className = 'stat-label';
        lbl.textContent = st.label;
        stat.appendChild(val);
        stat.appendChild(lbl);
        statsRow.appendChild(stat);
      }

      const content = document.createElement('div');
      content.className = 'stats-content';
      content.appendChild(statsRow);

      topRow.appendChild(iconWrap);
      topRow.appendChild(content);
      bar.appendChild(topRow);

      if (info.gameLine) {
        const gameLineDiv = document.createElement('div');
        gameLineDiv.className = 'game-line';
        const label = document.createElement('span');
        label.textContent = 'Game: ';
        gameLineDiv.appendChild(label);
        gameLineDiv.appendChild(document.createTextNode(info.gameLine));
        bar.appendChild(gameLineDiv);
      }

      bar.classList.remove('hidden');
    }

    // ── Main render ──
    function render() {
      applyDesignSettings('stats');

      // Phase banner
      const phase = deepGet(state, 'tournamentInfo.phase') || '';
      document.getElementById('phase-text').textContent = phase;

      // Player names
      const name1 = deepGet(state, `score.${SCOREBOARD}.player.1.rioName`) || '';
      const name2 = deepGet(state, `score.${SCOREBOARD}.player.2.rioName`) || '';
      document.getElementById('name-left').textContent  = name1;
      document.getElementById('name-right').textContent = name2;

      // Rosters
      renderRoster(1, 'roster-left');
      renderRoster(2, 'roster-right');

      // Stats
      renderStats(1, 'stats-left');
      renderStats(2, 'stats-right');

      // Twitter bar
      const twitter = deepGet(state, 'tournamentInfo.organizer_0_twitter') || '';
      const twitterBar = document.getElementById('twitter-bar');
      if (twitter) {
        document.getElementById('twitter-handle').textContent = twitter;
        twitterBar.classList.remove('hidden');
      } else {
        twitterBar.classList.add('hidden');
      }
    }

    OverlayBase.init({
      render,
      fetchSettings: true,
      shouldRender: (key) =>
        key === 'tournamentInfo.phase'
        || key === 'tournamentInfo.organizer_0_twitter'
        || key.startsWith(`score.${SCOREBOARD}.player.`)
        || key === `score.${SCOREBOARD}.batter`
        || key === `score.${SCOREBOARD}.pitcher`
        || key === `score.${SCOREBOARD}.half_inning`
        || key === `score.${SCOREBOARD}.home_team`
        || key.startsWith(`score.${SCOREBOARD}.stats.`),
      shouldRenderSettings: (key) => key.startsWith('overlays.'),
    });
  </script>
</body>
</html>
