<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="overlay-settings" content="cardBg, textColor, borderRadius, borderColor, borderWidth, fontFamily, cardShadow, textShadow, statValueColor, team1ShowYouTube, team2ShowYouTube" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'Bebas Neue Bold';
      src: url('/layout/fonts/BebasNeue%20Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
  </style>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      overflow: hidden;
      width: 1920px;
      height: 1080px;
      background: transparent;
      font-family: var(--font-family, 'Bebas Neue Bold', 'Inter', sans-serif);
      font-weight: 700;
      color: var(--text-primary, #fff);
    }

    /* ── Phase banner ── */
    #phase-banner {
      position: absolute;
      top: 2px;
      left: 0;
      right: 0;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    #phase-text {
      font-family: 'Bebas Neue Bold', sans-serif;
      font-size: 56px;
      font-weight: 700;
      text-transform: uppercase;
      -webkit-text-stroke: 5px black;
      text-shadow: 5px 5px 3px rgba(0,0,0,1), var(--text-shadow, none);
      paint-order: stroke fill;
      white-space: nowrap;
      overflow: visible;
    }

    /* ── Player panels ── */
    .player-panel {
      position: absolute;
      top: 14px;
      width: 348px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    #panel-left  { left: 0; }
    #panel-right { right: 0; }

    .player-name {
      font-family: 'Bebas Neue Bold', sans-serif;
      font-size: 56px;
      font-weight: 700;
      text-transform: uppercase;
      text-align: center;
      text-shadow: 5px 5px 3px rgba(0,0,0,1), var(--text-shadow, none);
      -webkit-text-stroke: 5px black;
      paint-order: stroke fill;
      white-space: nowrap;
      overflow: visible;
      width: 100%;
      line-height: 0.9;
      letter-spacing: 1px;
      height: 50px;
    }

    /* ── Facecam reservation (blank — facecam placed manually in OBS) ── */
    .facecam-slot {
      width: 280px;
      height: 375px;
    }

    /* ── Handle bar (YouTube / Twitter) ── */
    .handle-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      height: 50px;
      pointer-events: none;
    }
    .handle-bar.hidden { display: none !important; }
    .handle-icon {
      width: 40px;
      height: 40px;
      padding: 4px;
      border-radius: 4px;
      flex-shrink: 0;
      background-color: #000000;
      transform: translateY(0);
    }
    .handle-icon.youtube {
      background-color: transparent;
      padding: 0;
    }
    .handle-text {
      font-family: 'Bebas Neue Bold', sans-serif;
      font-size: 36px;
      font-weight: 700;
      text-transform: uppercase;
      text-shadow: 5px 5px 3px rgba(0,0,0,1), var(--text-shadow, none);
      -webkit-text-stroke: 5px black;
      paint-order: stroke fill;
      white-space: nowrap;
    }

    /* ── Controller gap (manually placed in OBS) ── */
    .controller-gap {
      width: 100%;
      height: 125px;
    }

    /* ── Roster grid ── */
    .roster-wrap {
      display: flex;
      justify-content: center;
    }
    .roster-grid {
      display: inline-grid;
    }
    .captain-slot, .role-container, .team-logo-slot {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .captain-slot img { width: var(--captain-size, 80px); height: auto; object-fit: contain; }
    .char-slot {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .char-slot img { width: var(--char-size, 40px); height: auto; object-fit: contain; }
    .role-container img { width: var(--trailing-size, 80px); height: auto; object-fit: contain; }
    .team-logo-slot img { width: var(--trailing-size, 80px); height: auto; object-fit: contain; }

    /* ── Stats bar ── */
    .stats-bar {
      width: 340px;
      background: var(--card-bg, rgba(15, 15, 25, 0.88));
      border: var(--border-width, 1px) solid var(--border-color, rgba(255,255,255,0.08));
      border-radius: var(--border-radius, 12px);
      padding: 6px 8px;
      filter: var(--card-shadow-filter, none);
      margin-top: 4px;
    }
    .stats-bar.hidden { display: none !important; }

    .stats-top-row {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
    }
    .char-icon-wrap { flex-shrink: 0; }
    .char-icon-wrap img {
      height: 40px;
      width: auto;
      object-fit: contain;
      border-radius: 4px;
    }
    .stats-content {
      flex: 1;
      min-width: 0;
      padding-left: 10px;
    }
    .stats-row {
      display: flex;
      justify-content: space-between;
    }
    .stat {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .stat-value {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
      color: var(--stat-value-color, var(--text-primary, #fff));
      text-shadow: var(--text-shadow, none);
    }
    .stat-label {
      font-size: 12px;
      font-weight: 400;
      color: var(--stat-subtext-color, rgb(155,155,155));
      text-transform: uppercase;
      letter-spacing: 0.3px;
      line-height: 1.2;
      text-shadow: var(--text-shadow, none);
    }
    .game-line {
      font-size: 14px;
      font-weight: 600;
      color: var(--stat-subtext-color, rgb(155,155,155));
      white-space: nowrap;
      overflow: visible;
      text-align: center;
      padding-top: 4px;
      border-top: 1px solid var(--border-color, rgba(255,255,255,0.08));
      margin-top: 4px;
      text-shadow: var(--text-shadow, none);
    }
    .game-line span { color: var(--stat-subtext-color, rgb(155,155,155)); }

    @keyframes statsBarIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .stats-bar.bar-in  { animation: statsBarIn 0.25s ease forwards; }
    .stats-bar.bar-out { opacity: 0; transition: opacity 0.2s ease; }
    @keyframes statValueFlash {
      0%   { color: var(--stat-value-color, var(--text-primary, #fff)); }
      35%  { color: var(--accent-color, #f59e0b); }
      100% { color: var(--stat-value-color, var(--text-primary, #fff)); }
    }
    .stat-value.stat-changed { animation: statValueFlash 0.6s ease forwards; }
  </style>
</head>
<body>

  <!-- Phase banner -->
  <div id="phase-banner">
    <span id="phase-text"></span>
  </div>

  <!-- Left player panel (Team 1) -->
  <div class="player-panel" id="panel-left">
    <div class="player-name" id="name-left"></div>
    <div class="facecam-slot"></div>
    <div class="handle-bar hidden" id="handle-left">
      <span class="handle-icon-wrap" id="handle-icon-left"></span>
      <span class="handle-text" id="handle-text-left"></span>
    </div>
    <div class="controller-gap"></div>
    <div class="roster-wrap"><div class="roster-grid" id="roster-left"></div></div>
    <div class="stats-bar hidden" id="stats-left"></div>
  </div>

  <!-- Right player panel (Team 2) -->
  <div class="player-panel" id="panel-right">
    <div class="player-name" id="name-right"></div>
    <div class="facecam-slot"></div>
    <div class="handle-bar hidden" id="handle-right">
      <span class="handle-icon-wrap" id="handle-icon-right"></span>
      <span class="handle-text" id="handle-text-right"></span>
    </div>
    <div class="controller-gap"></div>
    <div class="roster-wrap"><div class="roster-grid" id="roster-right"></div></div>
    <div class="stats-bar hidden" id="stats-right"></div>
  </div>

  <!-- Icon templates -->
  <template id="tpl-youtube">
    <svg class="handle-icon youtube" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path fill="#FF0000" d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814Z"/>
      <path fill="#ffffff" d="M9.546 15.568V8.432L15.818 12l-6.272 3.568Z"/>
    </svg>
  </template>
  <template id="tpl-twitter">
    <svg class="handle-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
      <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.744l7.73-8.835L1.254 2.25H8.08l4.261 5.635 5.903-5.635Zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
    </svg>
  </template>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/layout/lib/overlay-base.js"></script>
  <script src="/layout/lib/rio-data.js"></script>
  <script>
    document.body.dataset.refW = 1920;
    document.body.dataset.refH = 1080;

    const params = new URLSearchParams(window.location.search);
    const SCOREBOARD = parseInt(params.get('scoreboard')) || 1;
    const { deepGet, state, applyDesignSettings } = OverlayBase;

    // Per-slot CSS class for this scene's roster grid.
    const SLOT_CLASS = {
      captain: 'captain-slot',
      char: 'char-slot',
      role: 'role-container',
      teamLogo: 'team-logo-slot',
    };

    // Panel width for this scene — the natural roster (with trailing icons at captain size)
    // is uniformly scaled down to fit when it would otherwise overflow.
    const PANEL_W = 348;

    // Reference roster icon sizes — trailing icons match captain, all scale uniformly to fit.
    const CHAR_SIZE = 40;
    const CAPTAIN_SIZE = 80;
    const ROW_H = 48;
    const GAP = 4;

    function rosterFitScale(trailingCount) {
      const cols = 5 + trailingCount;
      const naturalGridW = CAPTAIN_SIZE + 4 * CHAR_SIZE + trailingCount * CAPTAIN_SIZE + (cols - 1) * GAP;
      return Math.min(1, PANEL_W / naturalGridW);
    }

    function renderRoster(teamNum, containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';

      const { deepGet: g, settings } = OverlayBase;
      const showRole = g(settings, 'overlays.roster.showRoleIcon', true) !== false;
      const showTeamLogo = g(settings, 'overlays.roster.showTeamLogo', true) !== false;

      const slots = RioData.getRosterSlots(state, SCOREBOARD, teamNum, {
        includeRole: showRole,
        includeTeamLogo: showTeamLogo,
      });

      const hasLogo = slots.some(s => s.kind === 'teamLogo');
      const trailingCount = (showRole ? 1 : 0) + (hasLogo ? 1 : 0);
      const s = rosterFitScale(trailingCount);
      const charSize = CHAR_SIZE * s;
      const captainSize = CAPTAIN_SIZE * s;
      const gap = GAP * s;
      const rowH = ROW_H * s;

      container.style.setProperty('--char-size', charSize + 'px');
      container.style.setProperty('--captain-size', captainSize + 'px');
      container.style.setProperty('--trailing-size', captainSize + 'px');
      container.style.columnGap = gap + 'px';
      container.style.rowGap = gap + 'px';
      container.style.gridTemplateRows = `${rowH}px ${rowH}px`;

      let cols = `${captainSize}px repeat(4, ${charSize}px)`;
      if (showRole)  cols += ` ${captainSize}px`;
      if (hasLogo)   cols += ` ${captainSize}px`;
      container.style.gridTemplateColumns = cols;

      let trailingCol = 5;
      for (const slot of slots) {
        const div = document.createElement('div');
        div.className = SLOT_CLASS[slot.kind];
        if (slot.kind === 'captain') {
          div.style.gridColumn = '1';
          div.style.gridRow = '1 / 3';
        } else if (slot.kind === 'role' || slot.kind === 'teamLogo') {
          trailingCol++;
          div.style.gridColumn = String(trailingCol);
          div.style.gridRow = '1 / 3';
        }
        const img = document.createElement('img');
        img.src = slot.imgUrl;
        img.onerror = () => img.style.display = 'none';
        div.appendChild(img);
        container.appendChild(div);
      }
    }

    const statsState = { 1: { charName: '', statsMap: null }, 2: { charName: '', statsMap: null } };

    function buildStatsDOM(bar, info) {
      bar.innerHTML = '';
      const topRow = document.createElement('div');
      topRow.className = 'stats-top-row';
      const iconWrap = document.createElement('div');
      iconWrap.className = 'char-icon-wrap';
      const img = document.createElement('img');
      img.src = info.charIconUrl;
      img.onerror = () => img.style.display = 'none';
      iconWrap.appendChild(img);
      const statsRow = document.createElement('div');
      statsRow.className = 'stats-row';
      for (const st of info.stats) {
        const stat = document.createElement('span');
        stat.className = 'stat';
        stat.dataset.label = st.label;
        const val = document.createElement('span');
        val.className = 'stat-value';
        val.textContent = st.value;
        const lbl = document.createElement('span');
        lbl.className = 'stat-label';
        lbl.textContent = st.label;
        stat.appendChild(val);
        stat.appendChild(lbl);
        statsRow.appendChild(stat);
      }
      const content = document.createElement('div');
      content.className = 'stats-content';
      content.appendChild(statsRow);
      topRow.appendChild(iconWrap);
      topRow.appendChild(content);
      bar.appendChild(topRow);
      if (info.gameLine) {
        const gameLineDiv = document.createElement('div');
        gameLineDiv.className = 'game-line';
        const label = document.createElement('span');
        label.textContent = info.bottomLabel + ': ';
        gameLineDiv.appendChild(label);
        gameLineDiv.appendChild(document.createTextNode(info.gameLine));
        bar.appendChild(gameLineDiv);
      } else if (info.bottomLabel) {
        const labelDiv = document.createElement('div');
        labelDiv.className = 'game-line';
        labelDiv.textContent = info.bottomLabel;
        bar.appendChild(labelDiv);
      }
    }

    function getStatsMap(bar) {
      const map = {};
      bar.querySelectorAll('.stat[data-label]').forEach(el => {
        const valEl = el.querySelector('.stat-value');
        if (valEl) map[el.dataset.label] = valEl.textContent;
      });
      return map;
    }

    function flashChangedStats(bar, oldStats) {
      if (!oldStats) return;
      bar.querySelectorAll('.stat[data-label]').forEach(el => {
        const valEl = el.querySelector('.stat-value');
        if (!valEl) return;
        if (el.dataset.label in oldStats && oldStats[el.dataset.label] !== valEl.textContent) {
          valEl.classList.remove('stat-changed');
          void valEl.offsetWidth;
          valEl.classList.add('stat-changed');
        }
      });
    }

    function renderStats(teamNum, barId) {
      const bar = document.getElementById(barId);
      const info = RioData.getStatsLine(state, SCOREBOARD, teamNum);
      if (!info) {
        bar.classList.add('hidden');
        statsState[teamNum].charName = '';
        statsState[teamNum].statsMap = null;
        return;
      }

      const useFade = OverlayBase.deepGet(OverlayBase.settings, 'overlays.stats.transitionType', 'fade') === 'fade';
      const changed = info.charName !== statsState[teamNum].charName;
      const oldStats = changed ? null : statsState[teamNum].statsMap;
      statsState[teamNum].charName = info.charName;

      if (changed && useFade && !bar.classList.contains('hidden')) {
        statsState[teamNum].statsMap = null;
        bar.classList.remove('bar-in');
        bar.classList.add('bar-out');
        setTimeout(() => {
          buildStatsDOM(bar, info);
          bar.classList.remove('bar-out', 'hidden');
          bar.classList.add('bar-in');
          statsState[teamNum].statsMap = getStatsMap(bar);
        }, 200);
      } else {
        buildStatsDOM(bar, info);
        bar.classList.remove('hidden');
        if (useFade) flashChangedStats(bar, oldStats);
        statsState[teamNum].statsMap = getStatsMap(bar);
      }
    }

    function renderHandle(teamNum, barId, iconId, textId) {
      const bar      = document.getElementById(barId);
      const iconWrap = document.getElementById(iconId);
      const textEl   = document.getElementById(textId);

      const player   = deepGet(state, `score.${SCOREBOARD}.player.${teamNum}`) || {};
      // Per-player handle-type toggle lives in the Rivalry layout settings
      // (overlays.scene.team{N}ShowYouTube). Default ON = YouTube, OFF = Twitter.
      const showYt   = deepGet(state, `overlays.scene.team${teamNum}ShowYouTube`) !== false;
      const type     = showYt ? 'youtube' : 'twitter';
      const value    = type === 'twitter' ? (player.twitter || '') : (player.youtube || '');

      if (!value) {
        bar.classList.add('hidden');
        return;
      }

      const tpl = document.getElementById(type === 'twitter' ? 'tpl-twitter' : 'tpl-youtube');
      iconWrap.innerHTML = '';
      iconWrap.appendChild(tpl.content.cloneNode(true));
      textEl.textContent = value;
      bar.classList.remove('hidden');
    }

    function render() {
      applyDesignSettings('stats');

      const phase = deepGet(state, 'tournamentInfo.phase') || '';
      document.getElementById('phase-text').textContent = phase;

      const name1 = deepGet(state, `score.${SCOREBOARD}.player.1.rioName`) || '';
      const name2 = deepGet(state, `score.${SCOREBOARD}.player.2.rioName`) || '';
      document.getElementById('name-left').textContent  = name1;
      document.getElementById('name-right').textContent = name2;

      renderHandle(1, 'handle-left',  'handle-icon-left',  'handle-text-left');
      renderHandle(2, 'handle-right', 'handle-icon-right', 'handle-text-right');

      renderRoster(1, 'roster-left');
      renderRoster(2, 'roster-right');

      renderStats(1, 'stats-left');
      renderStats(2, 'stats-right');
    }

    OverlayBase.init({
      render,
      fetchSettings: true,
      shouldRender: (key) =>
        key === 'tournamentInfo.phase'
        || key.startsWith(`score.${SCOREBOARD}.player.`)
        || key === `score.${SCOREBOARD}.batter`
        || key === `score.${SCOREBOARD}.pitcher`
        || key === `score.${SCOREBOARD}.half_inning`
        || key === `score.${SCOREBOARD}.home_team`
        || key.startsWith(`score.${SCOREBOARD}.stats.`),
      shouldRenderSettings: (key) => key.startsWith('overlays.') || key.startsWith('scoreboards.sources.'),
    });
  </script>
</body>
</html>
